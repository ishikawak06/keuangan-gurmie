<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gurmie Ayam - Sistem Manajemen Keuangan</title>
    
    <script>
        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gurmie: { bg: '#1c1917', panel: '#292524', orange: '#f97316', red: '#ef4444', success: '#22c55e', danger: '#f43f5e', blue: '#3b82f6' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['Fira Code', 'monospace'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        ::-webkit-scrollbar { width: 6px; }
        .dark ::-webkit-scrollbar-track { background: #292524; }
        :not(.dark) ::-webkit-scrollbar-track { background: #f3f4f6; }
        ::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 3px; }

        input, select, textarea { outline: none; transition: 0.3s; }
        .dark input, .dark select, .dark textarea { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; }
        :not(.dark) input, :not(.dark) select, :not(.dark) textarea { background: #ffffff; border: 1px solid #d1d5db; color: #1f2937; }
        input:focus, select:focus, textarea:focus { border-color: #f97316; box-shadow: 0 0 10px rgba(249,115,22,0.2); }
        .dark input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        
        .toast { position: fixed; bottom: 20px; right: 20px; z-index: 1000; transform: translateX(120%); transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
        .toast.show { transform: translateX(0); }

        .modal-backdrop { backdrop-filter: blur(8px); opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 100; background: rgba(0,0,0,0.5); }
        .modal-backdrop.active { opacity: 1; pointer-events: auto; }
        
        #sync-indicator { transition: opacity 0.3s; }
        .loading-shimmer { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="font-sans antialiased min-h-screen pb-10 relative bg-gray-50 text-gray-900 dark:bg-gurmie-bg dark:text-slate-200 transition-colors duration-300">

    <div id="sync-indicator" class="fixed top-0 left-0 w-full h-1 bg-gurmie-orange opacity-0 z-[200]"></div>

    <div id="toast" class="toast flex items-center gap-3 px-4 py-3 rounded-lg shadow-lg border backdrop-blur-md font-medium text-sm">
        <i id="toast-icon" class="fas"></i> <span id="toast-msg"></span>
    </div>

    <div id="ocr-preview-modal" class="modal-backdrop fixed inset-0 flex items-center justify-center p-4">
        <div class="modal-content bg-white dark:bg-gurmie-panel border border-blue-300 dark:border-blue-700 rounded-xl shadow-2xl max-w-3xl w-full overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center bg-blue-50 dark:bg-blue-900/30">
                <div class="flex items-center gap-3">
                    <h3 class="font-mono text-blue-600 dark:text-blue-400 font-bold"><i class="fas fa-robot mr-2"></i>PREVIEW DATA ENGINE AI</h3>
                    <span id="ocr-confidence-badge" class="px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider text-white"></span>
                </div>
                <button onclick="closeModal('ocr-preview-modal')" class="text-gray-400 hover:text-red-500 transition"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div id="ocr-warning-banner" class="hidden bg-yellow-50 dark:bg-yellow-900/30 p-3 text-xs text-yellow-700 dark:text-yellow-500 border-b border-yellow-200 dark:border-yellow-700/50 flex items-center gap-2 font-medium">
                <i class="fas fa-exclamation-triangle"></i> <span id="ocr-warning-text"></span>
            </div>
            <div class="p-5 overflow-y-auto flex-1 space-y-3 bg-gray-50 dark:bg-gray-800/20">
                <div class="bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700 overflow-hidden">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-gray-100 dark:bg-gray-900 text-[10px] uppercase text-gray-500">
                            <tr>
                                <th class="p-3 w-1/2">Nama Barang</th>
                                <th class="p-3 w-1/6">Qty</th>
                                <th class="p-3 w-1/4">Harga Unit</th>
                                <th class="p-3 text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="ocr-preview-tbody" class="divide-y divide-gray-200 dark:divide-gray-700"></tbody>
                    </table>
                </div>
                <button type="button" onclick="addOCRPreviewRow()" class="mt-2 w-full py-2 border border-dashed border-gray-300 dark:border-gray-600 rounded-lg text-xs text-blue-500 font-medium">+ Tambah Baris</button>
            </div>
            <div class="p-4 border-t border-gray-200 dark:border-gray-700 bg-white dark:bg-gurmie-panel flex justify-between items-center">
                <div class="text-xs text-gray-500 font-mono">Total AI: <span id="ocr-preview-gt" class="font-bold text-gray-900 dark:text-white text-lg">Rp 0</span></div>
                <div class="flex gap-3">
                    <button onclick="closeModal('ocr-preview-modal')" class="px-4 py-2 text-sm bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-white rounded-lg font-medium">Batal</button>
                    <button onclick="confirmOCRData()" class="px-5 py-2 text-sm bg-blue-500 hover:bg-blue-600 text-white rounded-lg font-bold shadow transition flex items-center gap-2"><i class="fas fa-check"></i> Transfer ke Form</button>
                </div>
            </div>
        </div>
    </div>

    <div id="analytics-modal" class="modal-backdrop fixed inset-0 flex items-center justify-center p-4">
        </div>
    <div id="detail-modal" class="modal-backdrop fixed inset-0 flex items-center justify-center p-4">
        <div class="modal-content bg-white dark:bg-gurmie-panel border border-gray-200 dark:border-gurmie-orange/30 rounded-xl shadow-xl max-w-lg w-full overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center bg-gray-50 dark:bg-gray-800/50">
                <h3 class="font-mono text-gurmie-orange font-bold"><i class="fas fa-receipt mr-2"></i>DATA TRANSAKSI</h3>
                <button onclick="closeModal('detail-modal')" class="text-gray-400 hover:text-white transition"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div class="p-5 overflow-y-auto" id="modal-body"></div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto px-4 pt-6">
        <header class="flex justify-between items-center border-b border-gray-200 dark:border-gray-800 pb-4 transition-colors duration-300">
            <div>
                <h1 class="text-2xl font-bold font-mono tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-gurmie-orange to-gurmie-red">
                    <i class="fas fa-drumstick-bite text-gurmie-orange mr-2"></i>Gurmie Ayam
                </h1>
                <p class="text-xs text-gray-500 dark:text-gray-400 mt-1 uppercase tracking-widest">Sistem Manajemen Keuangan</p>
            </div>
            <div class="flex gap-2 sm:gap-3">
                <button onclick="syncData()" class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-2 rounded text-sm transition flex items-center gap-2 shadow-sm font-bold">
                    <i class="fas fa-sync-alt" id="sync-icon"></i> <span class="hidden md:inline">TARIK DATA CLOUD</span>
                </button>
                <button onclick="openAnalytics()" class="bg-white hover:bg-blue-50 border-gray-200 text-gray-700 dark:bg-gray-800 dark:hover:bg-blue-900/20 border dark:border-gray-700 dark:text-white px-3 py-2 rounded text-sm transition flex items-center gap-2 shadow-sm">
                    <i class="fas fa-chart-bar text-blue-500"></i> <span class="hidden md:inline">Analitik</span>
                </button>
            </div>
        </header>

        <div class="mb-4 mt-8 flex flex-col md:flex-row justify-between md:items-end gap-3">
            <div>
                <h2 class="text-xl font-bold dark:text-white mb-1"><i class="fas fa-chart-line text-gurmie-orange mr-2"></i>Ringkasan Saldo & Pemasukan</h2>
                <p class="text-xs text-gray-500 font-mono" id="dashboard-period-label">Menampilkan data: Bulan Ini</p>
            </div>
            <div class="flex gap-2 items-center">
                <select id="dash-filter-type" onchange="handleDashFilterChange()" class="p-2 rounded-lg text-sm bg-white dark:bg-gurmie-panel border border-gray-300 dark:border-gray-700 cursor-pointer shadow-sm focus:border-gurmie-orange">
                    <option value="this_month">Bulan Ini</option>
                    <option value="all">Semua Data</option>
                </select>
            </div>
        </div>

        <div id="dashboard-cards" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-white dark:bg-gurmie-panel p-6 rounded-xl border border-gray-200 dark:border-gray-800 shadow-md">
                <p class="text-gray-500 text-sm font-semibold mb-1">TOTAL SALDO (NET)</p><h2 id="total-balance" class="text-3xl font-bold font-mono">Rp 0</h2>
            </div>
            <div class="bg-white dark:bg-gurmie-panel p-6 rounded-xl border border-gray-200 dark:border-gray-800 shadow-md">
                <p class="text-gray-500 text-sm font-semibold mb-1">TOTAL PEMASUKAN</p><h2 id="total-income" class="text-2xl font-bold font-mono text-gurmie-success">+ Rp 0</h2>
            </div>
            <div class="bg-white dark:bg-gurmie-panel p-6 rounded-xl border border-gray-200 dark:border-gray-800 shadow-md">
                <p class="text-gray-500 text-sm font-semibold mb-1">TOTAL PENGELUARAN</p><h2 id="total-expense" class="text-2xl font-bold font-mono text-gurmie-danger">- Rp 0</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-5 space-y-6">
                <div class="bg-white dark:bg-gurmie-panel p-5 rounded-xl border border-gray-200 dark:border-gray-800 shadow-md">
                    <h3 class="text-lg font-semibold mb-4 flex justify-between items-center">
                        <span id="form-title">Tambah Transaksi</span>
                    </h3>
                    <form id="transaction-form" class="space-y-4">
                        <input type="hidden" id="edit-id">
                        <div class="flex gap-4 p-1 bg-gray-100 dark:bg-gray-800/50 rounded-lg border dark:border-gray-700">
                            <label class="flex-1 cursor-pointer">
                                <input type="radio" name="type" value="income" class="peer sr-only" onchange="toggleFormMode()" checked>
                                <div class="text-center py-2 rounded-md peer-checked:bg-gurmie-success/20 peer-checked:text-gurmie-success peer-checked:font-bold text-gray-500 text-sm">Masuk</div>
                            </label>
                            <label class="flex-1 cursor-pointer">
                                <input type="radio" name="type" value="expense" class="peer sr-only" onchange="toggleFormMode()">
                                <div class="text-center py-2 rounded-md peer-checked:bg-gurmie-danger/20 peer-checked:text-gurmie-danger peer-checked:font-bold text-gray-500 text-sm">Keluar</div>
                            </label>
                        </div>
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">Tanggal</label>
                            <input type="date" id="date" required class="w-full p-2.5 rounded-lg text-sm">
                        </div>
                        <div>
                            <label class="block text-xs text-gray-500 mb-1">Kategori</label>
                            <select id="category" required class="w-full p-2.5 rounded-lg text-sm"></select>
                        </div>
                        <div id="nominal-container">
                            <label class="block text-xs text-gray-500 mb-1">Nominal (Rp)</label>
                            <input type="number" id="nominal-input" class="w-full p-2.5 rounded-lg text-sm font-mono font-bold" placeholder="0">
                        </div>
                        <div id="expense-only-sections" class="hidden">
                             <div id="items-container" class="space-y-3 mb-3"></div>
                             <button type="button" onclick="addEmptyRow()" class="w-full py-2 border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-lg text-sm">+ Tambah Item</button>
                        </div>
                        <button type="submit" class="w-full bg-gurmie-orange text-white font-bold py-3 rounded-lg shadow-md transition-all">SIMPAN & SINKRON</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-7 bg-white dark:bg-gurmie-panel p-5 rounded-xl border border-gray-200 dark:border-gray-800 shadow-md h-[800px] flex flex-col">
                <h3 class="text-lg font-semibold mb-4 border-b pb-2"><i class="fas fa-history text-gurmie-red mr-2"></i>Riwayat Transaksi</h3>
                <div class="overflow-y-auto flex-1 pr-2 space-y-2" id="transaction-list"></div>
            </div>
        </div>
    </div>

    <script>
        // --- KONFIGURASI CLOUD SINKRONISASI (GANTI DENGAN URL WEB APP ANDA) ---
        const API_URL = "https://script.google.com/macros/s/AKfycbxM-c8KcAiYd8SJXF-m16Xqb34eTRvP_aASf7SQkbcZICrlRgQwvzXju6RXumX4MF-A/exec";

        let transactions = [];
        const defaultCategories = [
            { id: 'c1', name: 'Bahan Baku', icon: 'fa-drumstick-bite', hex: '&#xf6d7;' },
            { id: 'c2', name: 'Operasional', icon: 'fa-store', hex: '&#xf54e;' },
            { id: 'c3', name: 'Tagihan', icon: 'fa-file-invoice-dollar', hex: '&#xf571;' },
            { id: 'c4', name: 'Gaji Pegawai', icon: 'fa-users', hex: '&#xf0c0;' },
            { id: 'c5', name: 'Lainnya', icon: 'fa-box', hex: '&#xf466;' }
        ];
        let categories = JSON.parse(localStorage.getItem('categories')) || defaultCategories;

        // --- CLOUD FUNCTIONS ---

        async function syncData() {
            setSyncStatus(true);
            try {
                const response = await fetch(API_URL + "?t=" + Date.now(), { cache: 'no-store' });
                const cloudData = await response.json();
                if (cloudData.error) throw new Error(cloudData.error);
                
                transactions = cloudData;
                localStorage.setItem('transactions', JSON.stringify(transactions));
                init();
                showToast("Data Berhasil Diambil dari Cloud", "success");
            } catch (err) {
                console.error("Sync Error:", err);
                showToast("Gagal Sinkronisasi", "error");
                transactions = JSON.parse(localStorage.getItem('transactions')) || [];
                init();
            } finally {
                setSyncStatus(false);
            }
        }

        async function saveToCloud() {
            setSyncStatus(true);
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(transactions),
                    headers: { 'Content-Type': 'text/plain' }
                });
                showToast("Berhasil Disimpan ke Cloud", "success");
            } catch (err) {
                showToast("Gagal Menyimpan ke Cloud", "error");
            } finally {
                setSyncStatus(false);
            }
        }

        function setSyncStatus(isLoading) {
            const bar = document.getElementById('sync-indicator');
            const icon = document.getElementById('sync-icon');
            if(isLoading) {
                bar.classList.add('loading-shimmer');
                bar.style.opacity = '1';
                icon.classList.add('fa-spin');
            } else {
                bar.classList.remove('loading-shimmer');
                setTimeout(() => bar.style.opacity = '0', 500);
                icon.classList.remove('fa-spin');
            }
        }

        // --- CORE LOGIC (Modifikasi Fungsi Submit & Delete agar Panggil saveToCloud) ---

        function init() {
            transactions.sort((a, b) => new Date(b.date) - new Date(a.date));
            renderList();
            updateDashboard();
        }

        document.getElementById('transaction-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const editId = document.getElementById('edit-id').value;
            const typeVal = document.querySelector('input[name="type"]:checked').value;
            const catVal = document.getElementById('category').value;
            let finalGrandTotal = 0;
            let itemsData = [];

            if (typeVal === 'income') {
                finalGrandTotal = parseFloat(document.getElementById('nominal-input').value) || 0;
            } else {
                const itemRows = document.querySelectorAll('.item-row');
                itemRows.forEach(row => {
                    const name = row.querySelector('.item-name').value;
                    const qty = parseFloat(row.querySelector('.item-qty').value) || 0;
                    const price = parseFloat(row.querySelector('.item-price').value) || 0;
                    const total = qty * price;
                    finalGrandTotal += total;
                    itemsData.push({ name, qty, price, total });
                });
            }

            const transactionData = {
                id: editId || Math.floor(Math.random() * 10000000).toString(),
                type: typeVal,
                amount: finalGrandTotal,
                date: document.getElementById('date').value,
                category: catVal,
                note: document.getElementById('note')?.value || '',
                items: itemsData
            };

            if (editId) {
                const idx = transactions.findIndex(t => t.id === editId);
                transactions[idx] = transactionData;
            } else {
                transactions.push(transactionData);
            }

            localStorage.setItem('transactions', JSON.stringify(transactions));
            init();
            
            // SIMPAN KE CLOUD OTOMATIS
            await saveToCloud();
            
            document.getElementById('transaction-form').reset();
            document.getElementById('items-container').innerHTML = '';
            addEmptyRow();
            toggleFormMode();
        });

        async function deleteTransaction(id) {
            if(!confirm('Hapus data?')) return;
            transactions = transactions.filter(t => t.id !== id);
            localStorage.setItem('transactions', JSON.stringify(transactions));
            init();
            await saveToCloud(); // Update cloud saat hapus
        }

        // --- UI & UTILS (Tetap) ---

        function formatRupiah(num) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);
        }

        function toggleFormMode() {
            const isIncome = document.querySelector('input[name="type"]:checked').value === 'income';
            const nomCont = document.getElementById('nominal-container');
            const expSect = document.getElementById('expense-only-sections');
            const catSelect = document.getElementById('category');
            
            if(isIncome) {
                nomCont.classList.remove('hidden');
                expSect.classList.add('hidden');
                catSelect.innerHTML = `<option value="Suntikan Dana">Suntikan Dana</option><option value="Modal">Modal</option>`;
            } else {
                nomCont.classList.add('hidden');
                expSect.classList.remove('hidden');
                catSelect.innerHTML = categories.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
                if(document.getElementById('items-container').children.length === 0) addEmptyRow();
            }
        }

        function addEmptyRow() {
            const container = document.getElementById('items-container');
            const row = document.createElement('div');
            row.className = "item-row bg-gray-50 dark:bg-gray-800 p-3 rounded-lg border dark:border-gray-700 flex gap-2 mb-2";
            row.innerHTML = `
                <input type="text" placeholder="Barang" class="item-name flex-1 p-2 text-xs rounded">
                <input type="number" placeholder="Qty" class="item-qty w-12 p-2 text-xs rounded">
                <input type="number" placeholder="Harga" class="item-price w-20 p-2 text-xs rounded">
                <button type="button" onclick="this.parentElement.remove()" class="text-red-500"><i class="fas fa-times"></i></button>
            `;
            container.appendChild(row);
        }

        function renderList() {
            const listEl = document.getElementById('transaction-list');
            listEl.innerHTML = transactions.map(trx => `
                <div class="flex items-center justify-between p-3 bg-white dark:bg-gurmie-panel border dark:border-gray-700 rounded-lg shadow-sm">
                    <div>
                        <p class="text-xs font-bold">${trx.category}</p>
                        <p class="text-[10px] text-gray-500">${trx.date}</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-mono text-sm font-bold ${trx.type === 'income' ? 'text-green-500' : 'text-red-500'}">
                            ${trx.type === 'income' ? '+' : '-'}${formatRupiah(trx.amount)}
                        </span>
                        <button onclick="deleteTransaction('${trx.id}')" class="text-xs text-gray-400 hover:text-red-500"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function updateDashboard() {
            let inc = 0, exp = 0;
            transactions.forEach(t => {
                if(t.type === 'income') inc += t.amount;
                else exp += t.amount;
            });
            document.getElementById('total-income').innerText = `+ ${formatRupiah(inc)}`;
            document.getElementById('total-expense').innerText = `- ${formatRupiah(exp)}`;
            document.getElementById('total-balance').innerText = formatRupiah(inc - exp);
        }

        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            toast.className = `toast show p-3 rounded-lg text-white ${type === 'success' ? 'bg-green-600' : 'bg-red-600'}`;
            document.getElementById('toast-msg').innerText = msg;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        window.onload = () => {
            document.getElementById('date').valueAsDate = new Date();
            syncData(); // Otomatis tarik data saat buka
        };
    </script>
</body>
</html>
