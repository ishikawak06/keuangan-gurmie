<!DOCTYPE html>

<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gurmie Ayam - Cloud Management</title>

    

    <script>

        const savedTheme = localStorage.getItem('theme') || 'dark';

        if (savedTheme === 'dark') document.documentElement.classList.add('dark');

        else document.documentElement.classList.remove('dark');

    </script>



    <script src="https://cdn.tailwindcss.com"></script>

    <script>

        tailwind.config = {

            darkMode: 'class',

            theme: {

                extend: {

                    colors: {

                        gurmie: { bg: '#1c1917', panel: '#292524', orange: '#f97316', red: '#ef4444', success: '#22c55e', danger: '#f43f5e', blue: '#3b82f6' }

                    },

                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['Fira Code', 'monospace'] }

                }

            }

        }

    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    

    <style>

        ::-webkit-scrollbar { width: 6px; }

        .dark ::-webkit-scrollbar-track { background: #292524; }

        :not(.dark) ::-webkit-scrollbar-track { background: #f3f4f6; }

        ::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 3px; }



        .toast { position: fixed; bottom: 20px; right: 20px; z-index: 1000; transform: translateX(120%); transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); }

        .toast.show { transform: translateX(0); }



        .modal-backdrop { backdrop-filter: blur(8px); opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 100;}

        .modal-backdrop.active { opacity: 1; pointer-events: auto; }

        

        #sync-indicator { transition: opacity 0.3s; }

        .loading-shimmer { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }

    </style>

</head>

<body class="font-sans antialiased min-h-screen pb-10 bg-gray-50 text-gray-900 dark:bg-gurmie-bg dark:text-slate-200 transition-colors duration-300">



    <div id="sync-indicator" class="fixed top-0 left-0 w-full h-1 bg-gurmie-orange opacity-0 z-[200]"></div>



    <div id="toast" class="toast flex items-center gap-3 px-4 py-3 rounded-lg shadow-lg border backdrop-blur-md font-medium text-sm">

        <i id="toast-icon" class="fas"></i> <span id="toast-msg"></span>

    </div>



    <div class="max-w-6xl mx-auto px-4 pt-6">

        <header class="flex justify-between items-center border-b border-gray-200 dark:border-gray-800 pb-4">

            <div>

                <h1 class="text-2xl font-bold font-mono tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-gurmie-orange to-gurmie-red">

                    <i class="fas fa-drumstick-bite text-gurmie-orange mr-2"></i>Gurmie Ayam

                </h1>

                <p class="text-[10px] text-gray-500 dark:text-gray-400 mt-1 uppercase tracking-widest flex items-center gap-2">

                    Cloud Sync Active <i class="fas fa-circle text-green-500 text-[6px]"></i>

                </p>

            </div>

            <div class="flex gap-2 items-center">

                <button onclick="syncData()" class="flex items-center gap-2 bg-blue-500 hover:bg-blue-600 text-white px-3 py-2 rounded-lg text-[10px] font-bold transition shadow-md">

                    <i class="fas fa-cloud-download-alt"></i> <span class="hidden sm:inline">TARIK DATA</span>

                </button>

                

                <button onclick="syncData()" class="bg-white dark:bg-gray-800 border dark:border-gray-700 p-2 rounded-lg hover:text-gurmie-orange transition" title="Sinkronisasi Manual">

                    <i class="fas fa-sync-alt" id="sync-icon"></i>

                </button>

                <button onclick="toggleTheme()" class="bg-white dark:bg-gray-800 border dark:border-gray-700 p-2 rounded-lg hover:text-yellow-500 transition">

                    <i class="fas fa-moon dark:hidden"></i><i class="fas fa-sun hidden dark:inline"></i>

                </button>

            </div>

        </header>



        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 my-8" id="dashboard-cards">

            <div class="bg-white dark:bg-gurmie-panel p-6 rounded-xl border border-gray-200 dark:border-gray-800 shadow-md">

                <p class="text-gray-500 text-[10px] font-bold uppercase mb-1">Total Saldo (Cloud)</p>

                <h2 id="total-balance" class="text-3xl font-bold font-mono">Rp 0</h2>

            </div>

            <div class="bg-white dark:bg-gurmie-panel p-6 rounded-xl border border-gray-200 dark:border-gray-800 shadow-md">

                <p class="text-gray-500 text-[10px] font-bold uppercase mb-1">Pemasukan</p>

                <h2 id="total-income" class="text-2xl font-bold font-mono text-gurmie-success">+ Rp 0</h2>

            </div>

            <div class="bg-white dark:bg-gurmie-panel p-6 rounded-xl border border-gray-200 dark:border-gray-800 shadow-md">

                <p class="text-gray-500 text-[10px] font-bold uppercase mb-1">Pengeluaran</p>

                <h2 id="total-expense" class="text-2xl font-bold font-mono text-gurmie-danger">- Rp 0</h2>

            </div>

        </div>



        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">

            <div class="lg:col-span-5 space-y-6">

                <div class="bg-white dark:bg-gurmie-panel p-5 rounded-xl border border-gray-200 dark:border-gray-800 shadow-md">

                    <h3 class="text-lg font-bold mb-4 flex justify-between items-center">

                        <span id="form-title">Transaksi Baru</span>

                    </h3>

                    

                    <form id="transaction-form" class="space-y-4">

                        <div class="flex gap-2 p-1 bg-gray-100 dark:bg-gray-800 rounded-lg border dark:border-gray-700">

                            <label class="flex-1 cursor-pointer">

                                <input type="radio" name="type" value="income" class="peer sr-only" onchange="toggleFormMode()" checked>

                                <div class="text-center py-2 rounded-md peer-checked:bg-gurmie-success/20 peer-checked:text-gurmie-success peer-checked:font-bold text-gray-500 text-xs transition">MASUK</div>

                            </label>

                            <label class="flex-1 cursor-pointer">

                                <input type="radio" name="type" value="expense" class="peer sr-only" onchange="toggleFormMode()">

                                <div class="text-center py-2 rounded-md peer-checked:bg-gurmie-danger/20 peer-checked:text-gurmie-danger peer-checked:font-bold text-gray-500 text-xs transition">KELUAR</div>

                            </label>

                        </div>



                        <div>

                            <label class="block text-[10px] text-gray-500 mb-1">TANGGAL</label>

                            <input type="date" id="date" required class="w-full p-2.5 rounded-lg text-sm dark:bg-gray-900 border dark:border-gray-700">

                        </div>



                        <div>

                            <label class="block text-[10px] text-gray-500 mb-1">KATEGORI</label>

                            <select id="category" required class="w-full p-2.5 rounded-lg text-sm dark:bg-gray-900 border dark:border-gray-700"></select>

                        </div>



                        <div id="nominal-input-wrap">

                            <label class="block text-[10px] text-gray-500 mb-1">NOMINAL (Rp)</label>

                            <input type="number" id="nominal-input" class="w-full p-2.5 rounded-lg text-sm font-mono font-bold dark:bg-gray-900 border dark:border-gray-700" placeholder="0">

                        </div>



                        <div id="items-container-wrap" class="hidden space-y-3">

                            <label class="block text-[10px] text-gray-500">DETAIL BARANG</label>

                            <div id="items-container" class="space-y-2"></div>

                            <button type="button" onclick="addEmptyRow()" class="w-full py-2 border-2 border-dashed border-gray-300 dark:border-gray-700 rounded-lg text-xs text-gray-500 hover:text-gurmie-orange transition">+ Tambah Item</button>

                        </div>



                        <button type="submit" class="w-full bg-gurmie-orange hover:bg-orange-600 text-white font-bold py-3 rounded-lg shadow-lg transition-all flex items-center justify-center gap-2">

                            <i class="fas fa-save"></i> SIMPAN & SINKRON

                        </button>

                    </form>

                </div>

            </div>



            <div class="lg:col-span-7 bg-white dark:bg-gurmie-panel p-5 rounded-xl border border-gray-200 dark:border-gray-800 shadow-md">

                <h3 class="text-lg font-bold mb-4 border-b dark:border-gray-800 pb-2">Riwayat Transaksi</h3>

                <div id="transaction-list" class="space-y-2 overflow-y-auto h-[600px] pr-2">

                </div>

            </div>

        </div>

    </div>



    <script>

// --- KONFIGURASI API ---
        const API_URL = "https://script.google.com/macros/s/AKfycbw0CX3KzrJfDU8HkAnYp9uuM0HBPENJsaPtkNiN_q5HnJaami7Lno2XukX3JHd0r7w/exec"; 

        let transactions = [];
        const categories_income = ['Suntikan Dana', 'Modal', 'Hasil Penjualan'];
        const categories_expense = ['Bahan Baku', 'Operasional', 'Tagihan', 'Gaji Pegawai', 'Lainnya'];

        // --- CORE LOGIC SINKRONISASI ---

        async function syncData() {
            setSyncStatus(true);
            try {
                // Gunakan cache: 'no-store' agar HP selalu ambil data terbaru
                const response = await fetch(API_URL, { cache: 'no-store' });
                
                if (!response.ok) throw new Error("Server error");
                
                const cloudData = await response.json();
                
                // Cek apakah response berisi error dari Google Script
                if (cloudData.error) {
                    showToast(cloudData.error, "error");
                    return;
                }

                transactions = cloudData.sort((a,b) => new Date(b.date) - new Date(a.date));
                localStorage.setItem('transactions', JSON.stringify(transactions));
                renderAll();
                showToast("Data Tersinkron", "success");
            } catch (err) {
                console.error("Sync Error:", err);
                showToast("Gagal Mengambil Data Cloud", "error");
                // Gunakan data local sebagai cadangan
                transactions = JSON.parse(localStorage.getItem('transactions')) || [];
                renderAll();
            } finally {
                setSyncStatus(false);
            }
        }

        async function saveToCloud() {
            setSyncStatus(true);
            try {
                // Kirim data dengan mode 'no-cors' karena Google Apps Script Redirect
                // Kita kirim sebagai text/plain untuk menghindari masalah CORS
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    body: JSON.stringify(transactions),
                    headers: {
                        'Content-Type': 'text/plain'
                    }
                });
                
                showToast("Berhasil Disimpan ke Cloud", "success");
            } catch (err) {
                console.error("Save Error:", err);
                showToast("Cloud Gagal: Cek Koneksi", "error");
            } finally {
                setSyncStatus(false);
            }
        }



        async function saveToCloud() {

            setSyncStatus(true);

            try {

                // Gunakan mode text/plain untuk menghindari masalah CORS preflight

                await fetch(API_URL, {

                    method: 'POST',

                    body: JSON.stringify(transactions),

                    headers: {

                        'Content-Type': 'text/plain;charset=utf-8',

                    },

                });

                showToast("Berhasil Disimpan ke Cloud", "success");

            } catch (err) {

                console.error("Save Error:", err);

                showToast("Cloud Gagal: Cek Izin Script", "error");

            } finally {

                setSyncStatus(false);

            }

        }



        function setSyncStatus(isLoading) {

            const bar = document.getElementById('sync-indicator');

            const icon = document.getElementById('sync-icon');

            if(isLoading) {

                bar.classList.add('loading-shimmer');

                bar.style.opacity = '1';

                icon.classList.add('fa-spin');

            } else {

                bar.classList.remove('loading-shimmer');

                setTimeout(() => bar.style.opacity = '0', 500);

                icon.classList.remove('fa-spin');

            }

        }



        // --- UI & RENDER LOGIC ---



        function toggleFormMode() {

            const isIncome = document.querySelector('input[name="type"]:checked').value === 'income';

            const catSelect = document.getElementById('category');

            const itemWrap = document.getElementById('items-container-wrap');

            const nomWrap = document.getElementById('nominal-input-wrap');



            catSelect.innerHTML = (isIncome ? categories_income : categories_expense)

                .map(c => `<option value="${c}">${c}</option>`).join('');



            if(isIncome) {

                itemWrap.classList.add('hidden');

                nomWrap.classList.remove('hidden');

            } else {

                itemWrap.classList.remove('hidden');

                nomWrap.classList.add('hidden');

                if(document.getElementById('items-container').children.length === 0) addEmptyRow();

            }

        }



        function addEmptyRow(n='', q='', p='') {

            const container = document.getElementById('items-container');

            const div = document.createElement('div');

            div.className = "flex gap-2 mb-2 bg-gray-50 dark:bg-gray-800 p-2 rounded border dark:border-gray-700";

            div.innerHTML = `

                <input type="text" placeholder="Barang" class="flex-1 p-1 text-xs dark:bg-transparent" value="${n}" required>

                <input type="number" placeholder="Qty" class="w-12 p-1 text-xs dark:bg-transparent text-center" value="${q}" required>

                <input type="number" placeholder="Harga" class="w-20 p-1 text-xs dark:bg-transparent font-mono" value="${p}" required>

                <button type="button" onclick="this.parentElement.remove()" class="text-red-500 px-1"><i class="fas fa-times"></i></button>

            `;

            container.appendChild(div);

        }



        function renderAll() {

            renderDashboard();

            renderList();

        }



        function renderDashboard() {

            let inc = 0, exp = 0;

            transactions.forEach(t => {

                const amt = Number(t.amount) || 0;

                if(t.type === 'income') inc += amt;

                else exp += amt;

            });

            document.getElementById('total-income').innerText = formatRupiah(inc);

            document.getElementById('total-expense').innerText = formatRupiah(exp);

            document.getElementById('total-balance').innerText = formatRupiah(inc - exp);

        }



        function renderList() {

            const list = document.getElementById('transaction-list');

            if (transactions.length === 0) {

                list.innerHTML = `<p class="text-center text-gray-500 text-xs py-10 italic">Tidak ada data. Klik "Tarik Data" jika Anda sudah mengisi di HP lain.</p>`;

                return;

            }

            list.innerHTML = transactions.map(t => `

                <div class="flex items-center justify-between p-3 bg-white dark:bg-gurmie-panel border dark:border-gray-800 rounded-lg shadow-sm">

                    <div>

                        <p class="text-xs font-bold">${t.category}</p>

                        <p class="text-[10px] text-gray-500">${t.date}</p>

                    </div>

                    <div class="text-right">

                        <p class="font-mono text-sm font-bold ${t.type === 'income' ? 'text-green-500' : 'text-red-500'}">

                            ${t.type === 'income' ? '+' : '-'}${formatRupiah(t.amount)}

                        </p>

                        <button onclick="deleteTrx('${t.id}')" class="text-[10px] text-gray-400 hover:text-red-500">Hapus</button>

                    </div>

                </div>

            `).join('');

        }



        // --- ACTIONS ---



        document.getElementById('transaction-form').onsubmit = async (e) => {

            e.preventDefault();

            const type = document.querySelector('input[name="type"]:checked').value;

            let amount = 0;

            let items = [];



            if(type === 'income') {

                amount = Number(document.getElementById('nominal-input').value);

            } else {

                const rows = document.getElementById('items-container').children;

                for(let row of rows) {

                    const n = row.children[0].value;

                    const q = Number(row.children[1].value);

                    const p = Number(row.children[2].value);

                    items.push({name: n, qty: q, price: p});

                    amount += (q * p);

                }

            }



            const newTrx = {

                id: Date.now().toString(),

                type,

                category: document.getElementById('category').value,

                date: document.getElementById('date').value,

                amount,

                items: items

            };



            transactions.push(newTrx);

            renderAll();

            

            // Simpan ke cloud

            await saveToCloud();

            

            // Reset Form

            document.getElementById('transaction-form').reset();

            document.getElementById('items-container').innerHTML = '';

            document.getElementById('date').valueAsDate = new Date();

            toggleFormMode();

        };



        async function deleteTrx(id) {

            if(!confirm('Hapus transaksi ini?')) return;

            transactions = transactions.filter(t => t.id !== id);

            renderAll();

            await saveToCloud();

        }



        function formatRupiah(num) {

            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);

        }



        function showToast(msg, type) {

            const toast = document.getElementById('toast');

            toast.className = `toast show flex items-center gap-3 px-4 py-3 rounded-lg shadow-lg border backdrop-blur-md font-medium text-sm ${type === 'success' ? 'bg-green-50 dark:bg-green-900/20 text-green-600' : 'bg-red-50 dark:bg-red-900/20 text-red-600'}`;

            document.getElementById('toast-msg').innerText = msg;

            setTimeout(() => toast.classList.remove('show'), 3000);

        }



        function toggleTheme() {

            document.documentElement.classList.toggle('dark');

            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');

        }



        window.onload = () => {

            document.getElementById('date').valueAsDate = new Date();

            toggleFormMode();

            syncData(); 

        };

    </script>

</body>

</html>
